version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ibtrader-postgres
    environment:
      POSTGRES_USER: ibtrader
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ibtrader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibtrader"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
