<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantBot UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar glass-panel">
        <div class="logo">
          <div class="logo-icon">Q</div>
          <h2>QuantBot</h2>
        </div>
        <nav>
          <button class="nav-btn active" data-target="dashboard-view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Dashboard
          </button>
          <button class="nav-btn" data-target="strategy-view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            Strategies
          </button>
        </nav>
      </aside>

      <main class="content-area">
        <header class="top-bar glass-panel">
          <h1>Dashboard</h1>
          <div class="status-indicator">
            <span class="dot pulse"></span>
            System Online
          </div>
        </header>

        <div id="dashboard-view" class="view active">
          <div class="metrics-grid">
            <div class="metric-card glass-panel">
              <h3>Account NLV</h3>
              <div class="value" id="nlv-value">---</div>
              <div class="trend positive">+2.4%</div>
            </div>
            <div class="metric-card glass-panel">
              <h3>Active Positions</h3>
              <div class="value" id="positions-count">---</div>
              <div class="trend" id="positions-updated">Updated Just Now</div>
            </div>
          </div>
          
          <div class="control-panel glass-panel" style="margin-bottom: 20px;">
            <h2>System Controls</h2>
            <div class="controls-grid" style="display: flex; gap: 15px; margin-top: 10px;">
              <button id="btn-trigger-pipeline" class="btn-primary" style="background: linear-gradient(135deg, #4f46e5, #3b82f6); border: none; padding: 10px 20px; border-radius: 8px; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Run Trading Pipeline
              </button>
              <button id="btn-engine-status" class="btn-secondary" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Check Engine Status
              </button>
            </div>
            <div id="engine-status-display" style="margin-top: 15px; font-size: 0.9em; color: #a1a1aa;"></div>
          </div>

          <div class="positions-section glass-panel">
            <h2>Current Positions</h2>
            <div class="table-container">
              <table id="positions-table">
                <thead>
                  <tr>
                    <th>Symbol</th>
                    <th>Action</th>
                    <th>Quantity</th>
                    <th>Avg Price</th>
                    <th>Market Price</th>
                    <th>Unrealized P/L</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Positions will be injected here -->
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="strategy-view" class="view hidden">
          <div class="strategy-layout">
            <div class="strategies-list glass-panel">
              <h2>Active Strategies</h2>
              <div class="list-container" id="strategies-list">
                <!-- Strategies injected here -->
              </div>
            </div>
            <div class="create-strategy glass-panel">
              <h2>Buy/Sell Basket</h2>
              <form id="create-strategy-form">
                <div class="form-group">
                  <label for="name">Strategy Name</label>
                  <input type="text" id="name" name="name" placeholder="Basket Threshold Test">
                </div>
                <input type="hidden" id="description" name="description" value="">
                <div class="threshold-grid">
                  <div class="form-group">
                    <label for="buyThreshold">Buy At Or Below ($)</label>
                    <input type="number" step="0.01" id="buyThreshold" name="buyThreshold" placeholder="1000.00" value="1000.00">
                  </div>
                  <div class="form-group">
                    <label for="sellThreshold">Sell At Or Above ($)</label>
                    <input type="number" step="0.01" id="sellThreshold" name="sellThreshold" placeholder="1200.00" value="1200.00">
                  </div>
                </div>

                <div class="form-group">
                  <label>Basket Targets</label>
                  <div id="basket-targets-container" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px;">
                    <!-- Target rows will be injected here -->
                  </div>
                  <div class="target-entry">
                    <input type="text" id="target-symbol" placeholder="Symbol" aria-label="Symbol">
                    <select id="target-class" aria-label="Asset class">
                      <option value="STOCK">Stock</option>
                      <option value="FUTURES">Futures</option>
                    </select>
                    <input type="number" id="target-quantity" placeholder="Qty" aria-label="Quantity">
                    <button type="button" id="btn-add-target" class="btn-secondary">Add</button>
                  </div>
                  <button type="button" id="btn-test-basket" class="btn-secondary full-width">Test Basket</button>
                </div>

                <details class="advanced-fields">
                  <summary>Advanced</summary>
                  <div class="form-group">
                    <label for="riskProfile">Risk Profile</label>
                    <select id="riskProfile" name="riskProfile" required>
                      <option value="CONSERVATIVE">Conservative</option>
                      <option value="MODERATE" selected>Moderate</option>
                      <option value="AGGRESSIVE">Aggressive</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="executionMode">Execution Mode</label>
                    <select id="executionMode" name="executionMode" required>
                      <option value="PAPER" selected>Paper Trading</option>
                      <option value="LIVE">Live Trading</option>
                      <option value="BACKTEST">Backtest</option>
                    </select>
                  </div>

                  <div class="threshold-grid">
                    <div class="form-group">
                      <label for="cooldownMinutes">Cooldown (min)</label>
                      <input type="number" id="cooldownMinutes" name="cooldownMinutes" required min="0" placeholder="5" value="5">
                    </div>
                    <div class="form-group">
                      <label for="priority">Priority</label>
                      <input type="number" id="priority" name="priority" required min="1" placeholder="1" value="1">
                    </div>
                  </div>
                </details>
                <button type="submit" class="btn-primary">Create Strategy</button>
              </form>
            </div>
          </div>
        </div>
      </main>
      
      <!-- Toast Notification Container -->
      <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
